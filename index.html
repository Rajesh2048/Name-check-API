document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fbutton>\n            <button onclick=\"{{ cancelAddPartner }}\" style=\"height:42px; padding:0 18px; border:1px solid #d5d9e0; border-radius:9px; background:#fff; color:#6b7280; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#9aa1ac; border-top:1px solid #eef0f3; padding-top:12px;\">Writes to <code style=\"font-family:ui-monospace,Menlo,monospace; color:#6b7280;\">config/pmode_config.json<\u002Fcode> &amp; <code style=\"font-family:ui-monospace,Menlo,monospace; color:#6b7280;\">config/partner_config.json<\u002Fcode> — requires server restart.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- Enable Partner tab -->\n      <sc-if value=\"{{ ncTabEnable }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#fff; border:1px solid #e6e9ee; border-radius:14px; box-shadow:0 2px 8px rgba(20,30,50,.04); overflow:hidden;\">\n        <div style=\"padding:15px 20px; border-bottom:1px solid #eef0f3; display:flex; align-items:center; justify-content:space-between;\">\n          <h2 style=\"margin:0; font-size:13px; font-weight:800; letter-spacing:.7px; color:#374151; text-transform:uppercase;\">Configured Corridors<\u002Fh2>\n          <button onclick=\"{{ setTabAdd }}\" style=\"height:32px; padding:0 14px; border:1px solid #d0161d; border-radius:7px; background:#fff; color:#d0161d; font-family:inherit; font-size:12px; font-weight:800; cursor:pointer;\">+ Add Corridor<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-x:auto;\"><div style=\"min-width:840px;\">\n        <div style=\"display:grid; grid-template-columns:110px 1.3fr 90px 110px 110px 100px 120px; padding:10px 20px; background:#f7f8fa; font-size:11px; font-weight:800; letter-spacing:.4px; color:#9aa1ac; text-transform:uppercase;\">\n          <span>Partner<\u002Fspan><span>Corridor<\u002Fspan><span>Proto<\u002Fspan><span>Check Type<\u002Fspan><span>Thresh.<\u002Fspan><span>Status<\u002Fspan><span style=\"text-align:right;\">Action<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ partners }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"display:grid; grid-template-columns:110px 1.3fr 90px 110px 110px 100px 120px; align-items:center; padding:14px 20px; border-bottom:1px solid #f2f4f7;\">\n            <span style=\"font-size:13px; font-weight:800; color:#1f2733; font-family:ui-monospace,Menlo,monospace;\">{{ p.partnerId }}<\u002Fspan>\n            <span style=\"font-size:13px; color:#374151;\"><b>{{ p.countryName }}<\u002Fb> <span style=\"color:#9aa1ac;\">· {{ p.mode }}<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:12px; color:#6b7280; font-weight:700;\">{{ p.protocol }}<\u002Fspan>\n            <span><span style=\"font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:12px; color:{{ p.checkTypeColor }}; background:{{ p.checkTypeBg }};\">{{ p.checkType }}<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:12px; color:#6b7280; font-family:ui-monospace,Menlo,monospace;\">{{ p.thresholds }}<\u002Fspan>\n            <span><span style=\"padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:800; background:{{ p.statusBg }}; color:{{ p.statusColor }};\">{{ p.statusLabel }}<\u002Fspan><\u002Fspan>\n            <span style=\"text-align:right;\">\n              <button onclick=\"{{ p.toggle }}\" style=\"height:32px; padding:0 16px; border:1px solid {{ p.toggleBorder }}; border-radius:7px; background:{{ p.toggleBg }}; color:{{ p.toggleColor }}; font-family:inherit; font-size:12px; font-weight:800; cursor:pointer;\">{{ p.toggleLabel }}<\u002Fbutton>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- Reports tab -->\n      <sc-if value=\"{{ ncTabReports }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px;\">\n          <sc-for list=\"{{ configTiles }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff; border:1px solid #e6e9ee; border-radius:12px; padding:16px 18px; box-shadow:0 2px 8px rgba(20,30,50,.04);\">\n              <div style=\"font-size:11.5px; font-weight:700; color:#9aa1ac; text-transform:uppercase; letter-spacing:.4px;\">{{ t.label }}<\u002Fdiv>\n              <div style=\"font-size:28px; font-weight:800; color:#1f2733; margin-top:6px; line-height:1;\">{{ t.value }}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#6b7280; margin-top:6px;\">{{ t.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <section style=\"background:#fff; border:1px solid #e6e9ee; border-radius:14px; box-shadow:0 2px 8px rgba(20,30,50,.04); overflow:hidden; margin-bottom:20px;\">\n          <div style=\"padding:15px 20px; border-bottom:1px solid #eef0f3; display:flex; align-items:center; justify-content:space-between;\">\n            <h2 style=\"margin:0; font-size:13px; font-weight:800; letter-spacing:.7px; color:#374151; text-transform:uppercase;\">Response Codes &amp; Decisions<\u002Fh2>\n            <button style=\"height:32px; padding:0 14px; border:1px solid #d5d9e0; border-radius:7px; background:#fff; color:#6b7280; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer;\">Export Excel<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto;\"><div style=\"min-width:840px;\">\n          <div style=\"display:grid; grid-template-columns:90px 150px 130px 120px 1fr; padding:10px 20px; background:#f7f8fa; font-size:11px; font-weight:800; letter-spacing:.4px; color:#9aa1ac; text-transform:uppercase;\">\n            <span>Code<\u002Fspan><span>Match Type<\u002Fspan><span>Check Type<\u002Fspan><span>Decision<\u002Fspan><span>Meaning<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ responseCodes }}\" as=\"c\" hint-placeholder-count=\"7\">\n            <div style=\"display:grid; grid-template-columns:90px 150px 130px 120px 1fr; align-items:center; padding:12px 20px; border-bottom:1px solid #f2f4f7; font-size:12.5px;\">\n              <span style=\"font-weight:800; color:#1f2733; font-family:ui-monospace,Menlo,monospace;\">{{ c.code }}<\u002Fspan>\n              <span style=\"color:#6b7280; font-family:ui-monospace,Menlo,monospace; font-size:11.5px;\">{{ c.match }}<\u002Fspan>\n              <span style=\"color:#6b7280;\">{{ c.check }}<\u002Fspan>\n              <span><span style=\"font-size:10.5px; font-weight:800; padding:3px 10px; border-radius:12px; color:{{ c.dColor }}; background:{{ c.dBg }};\">{{ c.decision }}<\u002Fspan><\u002Fspan>\n              <span style=\"color:#4b5563;\">{{ c.meaning }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <\u002Fdiv><\u002Fdiv>\n        <\u002Fsection>\n\n        <section style=\"background:#fff; border:1px solid #e6e9ee; border-radius:14px; box-shadow:0 2px 8px rgba(20,30,50,.04); overflow:hidden;\">\n          <div style=\"padding:15px 20px; border-bottom:1px solid #eef0f3;\">\n            <h2 style=\"margin:0; font-size:13px; font-weight:800; letter-spacing:.7px; color:#374151; text-transform:uppercase;\">Config Files<\u002Fh2>\n          <\u002Fdiv>\n          <sc-for list=\"{{ configFiles }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:13px 20px; border-bottom:1px solid #f2f4f7;\">\n              <div>\n                <div style=\"font-size:13px; font-weight:700; color:#1f2733; font-family:ui-monospace,Menlo,monospace;\">{{ f.file }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:#6b7280; margin-top:2px;\">{{ f.purpose }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-size:11px; font-weight:700; color:#9aa1ac; white-space:nowrap;\">{{ f.editable }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    openMenu: 'ADMINISTRATION', hoveredItem: 'ADMINISTRATION|Application Settings',\n    screen: 'dashboard', ncTab: 'enable',\n    npId: '', npCountry: '', npCountryName: '', npMode: 'BANK_DEPOSIT', npProtocol: 'REST', npCheckType: 'VERIFY',\n    partners: [\n      { partnerId: 'BNCTL', country: 'TL', countryName: 'Timor-Leste', mode: 'BANK_DEPOSIT', protocol: 'REST', checkType: 'VERIFY', match: '0.85', warn: '0.60', block: 'Yes', display: 'Yes', timeout: '5000', latency: '250 - 500', enabled: true },\n      { partnerId: 'UPT', country: 'UZ', countryName: 'Uzbekistan', mode: 'WALLET', protocol: 'SOAP', checkType: 'VERIFY', match: '0.85', warn: '0.60', block: 'No', display: 'Yes', timeout: '5000', latency: '300 - 650', enabled: true },\n      { partnerId: 'ALIPAY', country: 'CN', countryName: 'China', mode: 'BANK_DEPOSIT', protocol: 'REST', checkType: 'INQUIRY', match: '0.85', warn: '0.60', block: 'No', display: 'Yes', timeout: '5000', latency: '180 - 400', enabled: true },\n    ],\n  };\n\n  renderVals() {\n    const it = (label, sub) => ({ label, sub: sub || [] });\n\n    const categories = [\n      { label: 'ADMINISTRATION', items: [\n        it('Administration', ['Agent And Group Mapping', 'API Routing Setup', 'Bank Maintenance Time Setup', 'Customer Modify', 'Customer Setup', 'Customer Statement', 'Dashboard / Notification', 'Modify Customer Bank', 'Name Check API']),\n        it('Application Settings', ['Agent Bank Mapping', 'Country Setup', 'Currency Setup', 'GME Product Setup', 'Home Page Popup Setup', 'QR Setup', 'Service Type Setup', 'Mobile Menu Setup', 'App Update Detail', 'Receiver and Sender Field Setup', 'Send Page Field Setup', 'Message Setting', 'Password and Security Policy', 'Static Data', 'Receiver Page Field Setup', 'Notification Setting', 'Biller Payment Setup']),\n        it('Branch Information Management', ['Branch Setup', 'Branch FCY Transfer']),\n        it('Customer Management', ['Approve/Reject Face Verification', 'Customer Modification Log Report', 'Customer Report', 'GME Gold Card', 'GME Pay / Point Statement', 'GME Pay (Card) Statement', 'Inbound Bank List', 'KFTC Registration / Renewal', 'Password Reset', 'Re-Approve Customer', 'Receiver Details', 'Remove Duplicate Customer', 'Reward Point Management', 'Withdraw User Account']),\n        it('KICC API', ['KICC Wallet Deposit Request']),\n        it('KJ API', ['BLOCKED Partner API', 'Customer ID Verification', 'Customer Modification', 'Fund Deposit Report', 'KJ Deposit Error List', 'KJ Wallet Deposit Request']),\n        it('Online Customers', ['Easy Remit', 'Expired Passport', 'Online Remit']),\n        it('Non Kyc Customer'),\n        it('Stock Management'),\n        it('Agent Setup'),\n        it('Agent User Setup'),\n        it('Role Setup'),\n        it('User Monitoring'),\n        it('Admin User Setup'),\n        it('User Matrix Report'),\n        it('WSB API', ['WSB Wallet Deposit Request']),\n      ]},\n      { label: 'SYSTEM SECURITY', items: [\n        it('Compliance', ['AML Report', 'Approve OFAC Compliance', 'Compliance Release Report', 'Rule Setup', 'Search Compliance Release TXN']),\n        it('OFAC Management', ['Import Data', 'Manual Entry (OFAC)', 'OFAC Tracker']),\n        it('Risk Based Assessment', ['RBA Report', 'RBA Setup']),\n        it('Credit Risk', ['Country Per Txn Limit', 'Credit Limit']),\n        it('Whitelist', ['Beneficiary Whitelist', 'Sender Whitelist']),\n        it('Core System Logs', ['API Logs', 'Application Logs', 'Commission Logs', 'Login Logs', 'Oris Report Error Logs', 'Pwd Changed Logs', 'Transaction View Logs', 'Txn Error Logs']),\n        it('Mobile App Logs', ['Customer Logs', 'Error Logs', 'KFTC Logs', 'User Log']),\n      ]},\n      { label: 'REMITTANCE', items: [\n        it('Remittance', ['Agent Commission Rule', 'Commission Group Mapping']),\n        it('Service Charge / Commission', ['Minimum Balance Notification', 'Pay Commission', 'Send Commission', 'Service Charge']),\n        it('Campaign', ['Campaign Setup', 'Master History for Campaign']),\n        it('Coupon', ['Coupon Issue', 'Coupon Link Generator', 'Coupon Report']),\n        it('Loan Coupon', ['Coupon Issue', 'Coupon Report']),\n        it('Loan', ['Loan Control Service']),\n        it('Push Notification', ['Birthday Coupon Notification', 'Check Noticeboard', 'Inactive & Sleeping Customers', 'Marketing Promotion', 'Push Notification']),\n      ]},\n      { label: 'ACCOUNT', items: [\n        it('Account Report', ['Account Statement', 'Balance Sheet', 'Day Book', 'MisMatch Voucher Report', 'Profit & Loss Account', 'Revenue Report', 'Reward Point Report', 'Stock Position', 'Trial Balance', 'Voucher Report', 'Voucher Report By Date']),\n        it('Bill & Voucher', ['Account Detail', 'Balance Refund to Customer', 'Create Ledger', 'Fund Transfer', 'Manual Gain/Loss Revalue', 'Manual Voucher', 'Move Ledger', 'Treasury Deal Booking', 'Voucher Edit', 'Voucher Entry', 'Voucher Entry - FCY']),\n        it('Reconciliation', ['Auto Debit Deposit (Recovery Case)', 'Auto Reconciliation', 'Customer Balance Reconciliation', 'Customer Balance Update History', 'Daily Txn & Voucher Diff', 'Domestic Transfer Account', 'Partner Statement Report']),\n      ]},\n      { label: 'INBOUND', items: [\n        it('Inbound', ['B2B Transaction', 'Cancel Direct / Request', 'Change Inbound TXN Status', 'Compliance', 'Cost Rate Setting', 'Countrywise Inbound Transaction Report', 'Download Transaction', 'Inbound Customer', 'Inbound Transaction Report', 'Modify Transaction', 'Post Transaction', 'Search Easy Inbound', 'Search Transaction', 'Service Charge Setup']),\n        it('Receiver Initiated Inbound', ['Customer Guide', 'Inbound Customer Statement', 'Master Report', 'Receiver Initiated Transaction Report', 'Route Inbound Partner', 'Search Transaction', 'Sender Detail', 'Sender Page Setup', 'Transaction Analysis Report']),\n        it('Inbound Reports', ['Settlement Report']),\n        it('Open Banking', ['Return Claim']),\n      ]},\n      { label: 'OTHER SERVICES', items: [\n        it('Other Services', ['Bank Statement Check', 'Bank Validation', 'Bulk Email / SMS', 'Check Txn Status', 'Customer Inquiry', 'Deposit / Withdraw', 'GIBL Reconcile Rpt', 'GME Card Promotion', 'GME Finance', 'GME Pay', 'KT Sales Record Details', 'Manual Reprocess', 'Manual Txn Routing', 'Partner Reconciliation', 'Partner Txn Response', 'Penny Test Verification Check', 'QR Pay', 'Regulatory Report (BOK)', 'Reprocess Transaction', 'Smart Deposit', 'Virtual AC Upload', 'Zero Pay']),\n        it('Top Up', ['Domestic', 'International']),\n        it('Transportation Card', ['CashBee', 'EasyGo']),\n        it('Notifications', ['Fraud Access Monitoring', 'Fraud Analysis', 'KFTC Logs', 'Tran View Report', 'Trouble Ticket Report', 'Trouble Ticket Resolve']),\n      ]},\n      { label: 'TRANSACTION', items: [\n        it('Transaction', ['Approve Cancel Transaction', 'Approve Holded Txn', 'Approve Transaction', 'Approve TXN Modification', 'Approve/Reject On-Hold Txn', 'Block / Unblock Transaction', 'Cancel Request', 'Cancel Transaction - Full Refund', 'Cancel Transaction - Principal Refund', 'Domestic Send', 'Email Request', 'Marked Paid or Unpaid', 'Modification Request', 'Modify Transaction', 'Pay Transaction', 'Pending Account Deposit', 'Reprint Receipt', 'Scheduled Payment', 'Search Transaction', 'Send Transaction', 'Tele Remittance', 'Unlock Transaction', 'Update Duplicate Pin']),\n        it('Reports', ['Branch KPI Reports', 'Customer Approved User Wise', 'Gold Card Report', 'Local Txn Report', 'NativeCountrywise TXN Report', 'Partnerwise Income Exp Report', 'Referral Report', 'Regional Transaction / Registration Report', 'Settlement Report', 'Staffs Incentive', 'Transaction / Registration Group Report', 'Transaction / Registration Report']),\n        it('Reports Master', ['Cancel Transaction Report', 'Paying Agent Settlement Report', 'TempHold Inbound Txn Report', 'TempHold Txn Report', 'Transaction Analysis Report', 'Transaction Report', 'Transaction Report Master', 'Unpaid Report']),\n        it('Agent Reports', ['Cancel Report', 'Settlement Report', 'SOA Intl', 'Statement of Account', 'Transaction Report', 'Transaction Summary Report', 'User Wise Txn Report']),\n        it('MIS Reports', ['Buy / Sell Report', 'Currency Position', 'Transaction CDD / EDD']),\n      ]},\n      { label: 'EXCHANGE SETUP', items: [\n        it('Exchange Rate', ['Cost Rate Setup', 'Average Rate List', 'Compare Partner Rate', 'Cross Rate Decimal Mask', 'Default ExRate Amount', 'Exchange Rate Treasury', 'Exchange Report', 'Hana Bank API', 'Rate Mask']),\n      ]},\n      { label: 'MONEY EXCHANGE', items: [\n        it('ME: Transaction', ['Branch FCY Transfer', 'Buy / Sell Report', 'Currency Buy', 'Currency Position', 'Currency Sell']),\n      ]},\n    ];\n\n    const open = this.state.openMenu;\n    const hovered = this.state.hoveredItem;\n\n    const nav = categories.map(c => ({\n      label: c.label,\n      isOpen: open === c.label,\n      bg: open === c.label ? '#8f0d13' : 'transparent',\n      onToggle: () => this.setState(s => ({ openMenu: s.openMenu === c.label ? null : c.label, hoveredItem: null })),\n      items: c.items.map(i => {\n        const key = c.label + '|' + i.label;\n        const isHovered = hovered === key;\n        const hasSub = i.sub.length > 0;\n        return {\n          label: i.label, sub: i.sub, hasSub,\n          showFlyout: (open === c.label) && isHovered && hasSub,\n          rowBg: isHovered ? 'rgba(255,255,255,0.16)' : 'transparent',\n          rowBar: isHovered ? '#ffd1d3' : 'transparent',\n          onEnter: () => this.setState({ hoveredItem: key }),\n          onNav: (e) => {\n            if (i.label === 'Name Check API') {\n              if (e && e.preventDefault) e.preventDefault();\n              this.setState({ screen: 'nameCheck', openMenu: null, hoveredItem: null });\n            } else if (e && e.preventDefault) { e.preventDefault(); }\n          },\n        };\n      }),\n    }));\n\n    const cards = [\n      { label: \"Today's Send\", value: '4,120', grad: 'linear-gradient(135deg,#7cb342,#5f9c2e)' },\n      { label: \"Today's Pay\", value: '3,645', grad: 'linear-gradient(135deg,#3a7bf6,#2f6fed)' },\n      { label: \"Today's Cancel\", value: '0', grad: 'linear-gradient(135deg,#f26468,#ee4b50)' },\n    ];\n\n    const statuses = [\n      { label: 'Hold', count: 24, dot: '#f0a020', countColor: '#d0161d' },\n      { label: 'OFAC', count: 3, dot: '#d0161d', countColor: '#d0161d' },\n      { label: 'POST_START', count: 11, dot: '#3a7bf6', countColor: '#d0161d' },\n      { label: 'Pending GIBL Reprocessing', count: 7, dot: '#7c5cf0', countColor: '#d0161d' },\n    ];\n\n    const notifications = [\n      { title: 'Compliance review required', body: '3 transactions flagged by OFAC screening.', time: '12 min ago', dot: '#d0161d' },\n      { title: 'GIBL reprocessing queue', body: '7 transactions pending reprocessing.', time: '38 min ago', dot: '#f0a020' },\n      { title: 'Daily reconciliation complete', body: 'All agent balances reconciled successfully.', time: '2 hours ago', dot: '#7cb342' },\n    ];\n\n    const today = new Date('2026-07-07').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });\n\n    // ---- Name Check API config ----\n    const s = this.state;\n    const ctColor = (t) => t === 'VERIFY' ? '#2f6fed' : (t === 'INQUIRY' ? '#7c5cf0' : '#9aa1ac');\n    const ctBg = (t) => t === 'VERIFY' ? '#eaf1ff' : (t === 'INQUIRY' ? '#f0ecfd' : '#f2f4f7');\n\n    const partners = s.partners.map((p, idx) => ({\n      ...p,\n      thresholds: p.match + ' / ' + p.warn,\n      checkTypeColor: ctColor(p.checkType),\n      checkTypeBg: ctBg(p.checkType),\n      statusColor: p.enabled ? '#1f8a4c' : '#9aa1ac',\n      statusBg: p.enabled ? '#e7f6ec' : '#f2f4f7',\n      statusLabel: p.enabled ? 'ENABLED' : 'DISABLED',\n      toggleLabel: p.enabled ? 'Disable' : 'Enable',\n      toggleBg: p.enabled ? '#fff' : '#d0161d',\n      toggleColor: p.enabled ? '#6b7280' : '#fff',\n      toggleBorder: p.enabled ? '#d5d9e0' : '#d0161d',\n      toggle: () => this.setState(st => ({ partners: st.partners.map((x, i) => i === idx ? { ...x, enabled: !x.enabled } : x) })),\n    }));\n\n    const addPartner = () => {\n      const id = (this.state.npId || '').trim().toUpperCase();\n      if (!id) return;\n      this.setState(st => ({\n        partners: [...st.partners, {\n          partnerId: id, country: (st.npCountry || '--').toUpperCase(), countryName: st.npCountryName || '\\u2014',\n          mode: st.npMode, protocol: st.npProtocol, checkType: st.npCheckType,\n          match: '0.85', warn: '0.60', block: st.npCheckType === 'VERIFY' ? 'Yes' : 'No',\n          display: 'Yes', timeout: '5000', latency: '250 - 500', enabled: true,\n        }],\n        npId: '', npCountry: '', npCountryName: '', ncTab: 'enable',\n      }));\n    };\n\n    const decColor = (d) => d === 'ALLOW' ? '#1f8a4c' : (d === 'CONFIRM' ? '#e08a00' : (d === 'ERROR' ? '#9aa1ac' : '#d0161d'));\n    const decBg = (d) => d === 'ALLOW' ? '#e7f6ec' : (d === 'CONFIRM' ? '#fff4e0' : (d === 'ERROR' ? '#f2f4f7' : '#fdeaea'));\n    const rc = (code, match, check, decision, meaning) => ({ code, match, check, decision, meaning, dColor: decColor(decision), dBg: decBg(decision) });\n    const responseCodes = [\n      rc('NC-200', 'EXACT_MATCH', 'VERIFY', 'ALLOW', 'Score \\u2265 match_threshold (0.85). Names match.'),\n      rc('NC-201', 'PARTIAL_MATCH', 'VERIFY', 'CONFIRM', 'Score between warn (0.60) and match (0.85). Confirmation required.'),\n      rc('NC-210', 'NAME_RETURNED', 'INQUIRY', 'CONFIRM', 'Registered holder name returned (INQUIRY corridors).'),\n      rc('NC-400', 'NO_MATCH', 'VERIFY', 'BLOCK', 'Score below warn_threshold. BLOCK if block_on_no_match=Y, else CONFIRM.'),\n      rc('NC-400B', '\\u2014', '\\u2014', 'ERROR', 'Malformed JSON body (HTTP 400).'),\n      rc('NC-404', 'ACCOUNT_INVALID', 'VERIFY/INQUIRY', 'BLOCK', 'Account number not found in partner registry.'),\n      rc('NC-501', 'NOT_SUPPORTED', 'NONE', 'ALLOW', 'Corridor / country not enabled for name check.'),\n    ];\n\n    const enabledCount = s.partners.filter(p => p.enabled).length;\n    const configTiles = [\n      { label: 'Corridors', value: String(s.partners.length), sub: enabledCount + ' enabled' },\n      { label: 'API Endpoints', value: '6', sub: 'REST + health' },\n      { label: 'Response Codes', value: '7', sub: 'ALLOW / CONFIRM / BLOCK' },\n      { label: 'Version', value: '1.4', sub: 'batch runner' },\n    ];\n\n    const configFiles = [\n      { file: 'config/country_config.json', purpose: 'Country master switches & defaults.', editable: 'Editable \\u00b7 restart' },\n      { file: 'config/pmode_config.json', purpose: 'Per-corridor rules & thresholds.', editable: 'Editable \\u00b7 restart' },\n      { file: 'config/partner_config.json', purpose: 'Partner adapter settings (protocol, timeout, latency).', editable: 'Editable \\u00b7 restart' },\n      { file: 'config/partner_accounts.json', purpose: 'Mock partner registry: account \\u2192 holder name.', editable: 'Prod: real adapters' },\n      { file: 'server/name_check_log.jsonl', purpose: 'Audit log; one JSON line per request.', editable: 'Auto (append only)' },\n    ];\n\n    return {\n      nav, cards, statuses, notifications, today,\n      anyOpen: !!open,\n      clearHover: () => this.setState({ hoveredItem: null }),\n      closeMenu: () => this.setState({ openMenu: null, hoveredItem: null }),\n\n      showDashboard: s.screen === 'dashboard',\n      showNameCheck: s.screen === 'nameCheck',\n      goDashboard: (e) => { if (e && e.preventDefault) e.preventDefault(); this.setState({ screen: 'dashboard' }); },\n      subNav: (e) => {\n        if (e && e.preventDefault) e.preventDefault();\n        const t = (e.currentTarget.textContent || '').trim();\n        if (t === 'Name Check API') this.setState({ screen: 'nameCheck', openMenu: null, hoveredItem: null });\n      },\n\n      ncTabAdd: s.ncTab === 'add', ncTabEnable: s.ncTab === 'enable', ncTabReports: s.ncTab === 'reports',\n      setTabAdd: () => this.setState({ ncTab: 'add' }),\n      setTabEnable: () => this.setState({ ncTab: 'enable' }),\n      setTabReports: () => this.setState({ ncTab: 'reports' }),\n      tabAddColor: s.ncTab === 'add' ? '#d0161d' : '#6b7280', tabAddBar: s.ncTab === 'add' ? '#d0161d' : 'transparent',\n      tabEnableColor: s.ncTab === 'enable' ? '#d0161d' : '#6b7280', tabEnableBar: s.ncTab === 'enable' ? '#d0161d' : 'transparent',\n      tabReportsColor: s.ncTab === 'reports' ? '#d0161d' : '#6b7280', tabReportsBar: s.ncTab === 'reports' ? '#d0161d' : 'transparent',\n\n      partners, addPartner,\n      cancelAddPartner: () => this.setState({ npId: '', npCountry: '', npCountryName: '', ncTab: 'enable' }),\n      npId: s.npId, npCountry: s.npCountry, npCountryName: s.npCountryName,\n      npMode: s.npMode, npProtocol: s.npProtocol, npCheckType: s.npCheckType,\n      setNpId: (e) => this.setState({ npId: e.target.value }),\n      setNpCountry: (e) => this.setState({ npCountry: e.target.value }),\n      setNpCountryName: (e) => this.setState({ npCountryName: e.target.value }),\n      setNpMode: (e) => this.setState({ npMode: e.target.value }),\n      setNpProtocol: (e) => this.setState({ npProtocol: e.target.value }),\n      setNpCheckType: (e) => this.setState({ npCheckType: e.target.value }),\n\n      responseCodes, configTiles, configFiles,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
